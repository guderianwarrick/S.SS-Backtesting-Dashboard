<title>Stock Sentiment 回测看板</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1923;color:#e0e6ed;padding:20px}
.container{max-width:1400px;margin:0 auto}
h1{font-size:24px;margin-bottom:6px;color:#fff}
.subtitle{color:#8899aa;font-size:14px;margin-bottom:24px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#1a2d3a;border-radius:10px;padding:16px 20px;border:1px solid #253a48}
.stat-card .label{font-size:12px;color:#8899aa;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:26px;font-weight:700;color:#fff;margin-top:4px}
.stat-card .value.positive{color:#4ade80}
.stat-card .value.negative{color:#f87171}
.chart-container{background:#1a2d3a;border-radius:10px;padding:20px;border:1px solid #253a48;margin-bottom:24px}
.chart-container h3{font-size:15px;color:#b0c4d8;margin-bottom:12px}
.chart-wrapper{position:relative;width:100%;height:400px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:8px 10px;color:#8899aa;border-bottom:1px solid #253a48;font-weight:600;font-size:11px;text-transform:uppercase}
tbody td{padding:8px 10px;border-bottom:1px solid #1e3342}
tbody tr:hover{background:#1e3342}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag.bullish{background:#14522b;color:#4ade80}
.tag.bearish{background:#521414;color:#f87171}
.tag.neutral{background:#2a3a4a;color:#94a3b8}
.up{color:#4ade80}
.down{color:#f87171}
</style>
</head>

function render() {
  let html = '';
  for (const r of MENTIONS) {
    const ch = r.change_pct;
    let chStr = '-', chCls = '';
    if (ch !== null && ch !== undefined) {
      chStr = (ch >= 0 ? '+' : '') + ch.toFixed(2) + '%';
      if (ch > 0) chCls = 'up';
      else if (ch < 0) chCls = 'down';
    }
    const tagCls = r.total_score > 0.5 ? 'bullish' : (r.total_score < -0.3 ? 'bearish' : 'neutral');
    html += `<tr>
      <td><strong>${r.symbol}</strong></td>
      <td>${r.count}次</td>
      <td><span class="tag ${tagCls}">${r.total_score >= 0 ? '+' : ''}${r.total_score.toFixed(3)}</span></td>
      <td>${r.weight.toFixed(1)}%</td>
      <td>${r.first_date}</td>
      <td>${r.price_first ? '$' + r.price_first.toFixed(2) : '-'}</td>
      <td>${r.price_now ? '$' + r.price_now.toFixed(2) : '-'}</td>
      <td class="${chCls}">${chStr}</td>
    </tr>`;
  }
  document.getElementById('mentionsBody').innerHTML = html;
}
